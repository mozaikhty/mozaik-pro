<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozaik / Keşfet</title>
    <style>
        /* GENEL SIFIRLAMA VE X RENKLERİ */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fff; margin: 0; padding: 0; color: #0f1419; }
        * { box-sizing: border-box; }
        a { text-decoration: none; color: inherit; }

        .app-container { display: flex; justify-content: center; max-width: 1250px; margin: 0 auto; min-height: 100vh; }
        
        .sidebar-left { width: 275px; padding: 10px 20px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; border-right: 1px solid #eff3f4; }
        .logo-desktop { font-size: 28px; font-weight: 800; padding: 10px; margin-bottom: 10px; display: inline-block; color: #1da1f2; }
        .desktop-nav { display: flex; flex-direction: column; gap: 5px; }
        .desktop-nav-item { display: flex; align-items: center; gap: 15px; font-size: 20px; padding: 12px; border-radius: 30px; transition: 0.2s; cursor: pointer; width: fit-content; font-weight: 500; }
        .desktop-nav-item:hover { background-color: #e7f5fe; color: #1da1f2; }
        .desktop-nav-item.active { font-weight: bold; }
        .desktop-post-btn { background: #1da1f2; color: white; border: none; border-radius: 30px; font-size: 17px; font-weight: bold; padding: 15px; margin-top: 15px; cursor: pointer; transition: 0.2s; width: 90%; }

        .feed-main { width: 600px; min-height: 100vh; border-right: 1px solid #eff3f4; padding-bottom: 80px; }
        .header-sticky { position: sticky; top: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); z-index: 100; border-bottom: 1px solid #eff3f4; }
        
        .mobile-header-top { display: none; padding: 12px 20px; align-items: center; justify-content: space-between; border-bottom: 1px solid #eff3f4; }
        
        .search-header-box { padding: 10px 15px; }
        .search-input { width: 100%; box-sizing: border-box; padding: 12px 20px; font-size: 15px; border: none; background: #eff3f4; border-radius: 30px; outline: none; transition: 0.3s; }
        .search-input:focus { background: white; border: 1px solid #1da1f2; }

        .feed-tabs { display: flex; width: 100%; height: 53px; border-bottom: 1px solid #eff3f4; }
        .feed-tab { flex: 1; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: 500; color: #536471; transition: 0.2s; position: relative; }
        .feed-tab.active { color: #0f1419; font-weight: bold; }
        .tab-indicator { position: absolute; bottom: 0; height: 4px; background: #1da1f2; border-radius: 4px; display: none; width: 60px; }
        .feed-tab.active .tab-indicator { display: block; }

        /* MOBİL SOL ÇEKMECE MENÜSÜ (DRAWER) */
        .mobile-sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 4000; cursor:pointer;}
        .mobile-sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: white; z-index: 4001; transition: left 0.3s cubic-bezier(0.0, 0.0, 0.2, 1); box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; }
        .mobile-sidebar.open { left: 0; }
        .sidebar-header-mobile { padding: 20px; border-bottom: 1px solid #eff3f4; }
        .sidebar-avatar-mobile { width: 45px; height: 45px; border-radius: 50%; background: #eee; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 10px; cursor: pointer; border: 1px solid #ddd; }
        .sidebar-avatar-mobile img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-name-mobile { font-weight: 800; font-size: 18px; color: #0f1419; margin-bottom: 2px; }
        .sidebar-handle-mobile { color: #536471; font-size: 15px; margin-bottom: 15px; }
        .sidebar-stats-mobile { display: flex; gap: 15px; font-size: 14px; color: #536471; }
        .sidebar-stats-mobile b { color: #0f1419; }
        .sidebar-menu-mobile { display: flex; flex-direction: column; padding: 10px 0; }
        .sidebar-menu-item { padding: 15px 20px; font-size: 20px; font-weight: bold; color: #0f1419; display: flex; align-items: center; gap: 15px; text-decoration: none; transition: 0.2s; }
        .sidebar-menu-item:hover { background: #eff3f4; }
        .sidebar-divider { height: 1px; background: #eff3f4; margin: 10px 0; }

        .search-results-container { text-align: left; }
        .trending-item { padding: 12px 16px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #eff3f4; display: block; }
        .trending-item:hover { background: #f7f9f9; }
        .trend-category { font-size: 13px; color: #536471; margin-bottom: 2px; }
        .trend-name { font-size: 15px; font-weight: bold; color: #0f1419; margin-bottom: 2px; }
        .trend-count { font-size: 13px; color: #536471; }

        .search-user-item { display: flex; align-items: center; gap: 15px; padding: 12px 16px; text-decoration: none; color: #0f1419; border-bottom: 1px solid #eff3f4; transition: 0.2s; }
        .search-user-item:hover { background: #f7f9f9; }
        .search-avatar { width: 48px; height: 48px; border-radius: 50%; overflow: hidden; background: #eee; flex-shrink: 0; }
        .search-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .search-user-info { display: flex; flex-direction: column; }
        .search-username { font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 4px; }
        .search-handle { color: #536471; font-size: 15px; }

        /* POST ZIRHI */
        .post { display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #eff3f4; cursor: pointer; transition: 0.2s; background: white; position: relative; -webkit-tap-highlight-color: transparent;}
        .post * { cursor: pointer !important; }
        .post:hover { background: #f7f9f9; }
        .post-left { flex-shrink: 0; }
        .post-avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; overflow:hidden;}
        .post-avatar-img img { width: 100%; height: 100%; object-fit: cover; }
        .post-right { flex: 1; overflow: hidden; }
        
        .post-header-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; position:relative;}
        .author-group { display: flex; align-items: center; gap: 4px; font-size: 15px; margin-bottom: 2px; user-select: none; -webkit-user-select: none; cursor: pointer;}
        .author-name { font-weight: bold; color: #0f1419; }
        .author-username, .post-time { color: #536471; }
        
        .post-content { font-size: 15px; color: #0f1419; line-height: 1.5; margin-bottom: 10px; user-select: none; -webkit-user-select: none; cursor: pointer !important; }
        .hashtag { color: #1da1f2; text-decoration: none; }
        .post-image-container { border-radius: 16px; overflow: hidden; border: 1px solid #eff3f4; margin-top: 10px; }
        .post-image { width: 100%; max-height: 400px; object-fit: cover; display: block; pointer-events: none;}

        .sidebar-right { width: 350px; padding: 10px 20px; position: sticky; top: 0; height: 100vh; }
        .who-to-follow { background: #f7f9f9; border-radius: 16px; padding: 15px; margin-top: 10px; }
        .wtf-title { font-size: 20px; font-weight: 800; margin-bottom: 15px; }

        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #eff3f4; z-index: 1000; padding: 10px 0; justify-content: space-around; }
        .nav-item { color: #536471; font-size: 24px; padding: 5px 20px; border-radius: 30px; transition: 0.2s; }
        .nav-item.active { color: #0f1419; font-weight: bold; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: flex-start; padding-top: 50px; }
        .modal-content { background: white; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; }
        .user-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; text-decoration: none; color: #333; transition: 0.2s; background: #f9f9f9; margin-bottom: 5px; }
        .user-row:hover { background: #ebf5fb; }
        .row-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; border: 1px solid #ddd; display: flex; justify-content: center; align-items: center; font-size: 20px; }

        @media (max-width: 1000px) {
            .sidebar-left, .sidebar-right { display: none; }
            .feed-main { width: 100%; border: none; padding-bottom: 60px; }
            .mobile-header-top { display: flex; }
            .bottom-nav { display: flex; }
        }
    </style>
</head>
<body>

    <div class="mobile-sidebar-overlay" id="mobile-sidebar-overlay" onclick="window.closeMobileSidebar()"></div>
    <div class="mobile-sidebar" id="mobile-sidebar">
        <div class="sidebar-header-mobile">
            <div class="sidebar-avatar-mobile" id="sidebar-avatar-mobile" onclick="window.goToMyProfile()">👤</div>
            <div class="sidebar-name-mobile" id="sidebar-name-mobile">Yükleniyor...</div>
            <div class="sidebar-handle-mobile" id="sidebar-handle-mobile">@bekleniyor</div>
            <div class="sidebar-stats-mobile">
                <div onclick="window.showMyFollowing()" style="cursor:pointer;"><b id="sidebar-following-count">0</b> Takip edilen</div>
                <div onclick="window.showMyFollowers()" style="cursor:pointer;"><b id="sidebar-followers-count">0</b> Takipçi</div>
            </div>
        </div>
        <div class="sidebar-menu-mobile">
            <a href="#" class="sidebar-menu-item" id="sidebar-profile-link" onclick="window.goToMyProfile()">👤 Profil</a>
            <a href="#" class="sidebar-menu-item" onclick="alert('Premium (Abonelik) sistemi çok yakında!')">✨ Premium</a>
            <a href="#" class="sidebar-menu-item" onclick="alert('Yer İşaretleri yakında eklenecek!')">🔖 Yer İşaretleri</a>
            <div class="sidebar-divider"></div>
            <a href="#" class="sidebar-menu-item" style="font-size: 16px; font-weight: normal;" onclick="alert('Ayarlar yakında!')">⚙️ Ayarlar ve gizlilik</a>
            <a href="#" class="sidebar-menu-item" style="font-size: 16px; font-weight: normal; color: #e74c3c;" onclick="window.logoutUser()">🚪 Çıkış Yap</a>
        </div>
    </div>

    <div class="app-container">
        <nav class="sidebar-left">
            <a href="feed.html" class="logo-desktop">Mozaik</a>
            <div class="desktop-nav">
                <a href="feed.html" class="desktop-nav-item">🏠 Anasayfa</a>
                <a href="search.html" class="desktop-nav-item active">🔍 Keşfet</a>
                <a href="notifications.html" class="desktop-nav-item">🔔 Bildirimler</a>
                <a href="chat.html" class="desktop-nav-item">✉️ Mesajlar</a>
                <a href="#" class="desktop-nav-item" id="desktop-profile-link" onclick="window.goToMyProfile()">👤 Profil</a>
            </div>
            <button class="desktop-post-btn" onclick="window.location.href='feed.html'">Gönderi Yayınla</button>
        </nav>

        <main class="feed-main">
            <div class="header-sticky">
                <div class="mobile-header-top">
                    <div id="mobile-avatar-header" style="width:32px; height:32px; border-radius:50%; background:#eee; overflow:hidden; cursor:pointer;" onclick="window.openMobileSidebar()">👤</div>
                    <div style="flex:1; text-align:center; font-weight:900; font-size:20px;">Keşfet</div>
                    <div style="width:32px;"></div>
                </div>
                
                <div class="search-header-box">
                    <input type="text" id="search-input" class="search-input" placeholder="Kullanıcı veya etiket ara...">
                </div>
                <div class="feed-tabs">
                    <div class="feed-tab active" id="tab-users">Kişiler <div class="tab-indicator"></div></div>
                    <div class="feed-tab" id="tab-tags">Gündem <div class="tab-indicator"></div></div>
                </div>
            </div>
            <div id="search-results" class="search-results-container"></div>
        </main>

        <aside class="sidebar-right">
            <div class="who-to-follow">
                <div class="wtf-title">Kimi Takip Etmeli</div>
                <div style="font-size:14px; color:#536471;">Öneriler yakında burada olacak.</div>
            </div>
        </aside>
    </div>

    <div class="bottom-nav">
        <a href="feed.html" class="nav-item">🏠</a>
        <a href="search.html" class="nav-item active">🔍</a>
        <a href="chat.html" class="nav-item">✉️</a>
        <a href="notifications.html" class="nav-item">🔔</a>
    </div>

    <div class="modal-overlay" id="users-list-modal">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <h3 id="users-list-title" style="margin:0;">Liste</h3>
                <button class="close-btn" id="close-list-btn">&times;</button>
            </div>
            <div id="users-list-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC07_DzrwOlwWwopQZhUkHL1sj2zPDIT7k", authDomain: "mozaiksosyalmedya.firebaseapp.com", projectId: "mozaiksosyalmedya", storageBucket: "mozaiksosyalmedya.firebasestorage.app", messagingSenderId: "492534131254", appId: "1:492534131254:web:6644008a553294be05c697" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let allUsers = []; let allPosts = []; let allUsersData = {}; let trendingTags = []; let currentTab = 'users'; let myUsername = null;
        
        const tabUsers = document.getElementById('tab-users'); const tabTags = document.getElementById('tab-tags');
        const searchInput = document.getElementById('search-input'); const resultsContainer = document.getElementById('search-results');

        window.goToMyProfile = function() { if(myUsername) window.location.href = 'profile.html?user=' + myUsername; };
        window.openMobileSidebar = function() { document.getElementById('mobile-sidebar-overlay').style.display = 'block'; setTimeout(() => { document.getElementById('mobile-sidebar').classList.add('open'); }, 10); };
        window.closeMobileSidebar = function() { document.getElementById('mobile-sidebar').classList.remove('open'); setTimeout(() => { document.getElementById('mobile-sidebar-overlay').style.display = 'none'; }, 300); };
        window.logoutUser = function() { signOut(auth).then(() => { window.location.href = "index.html"; }); };
        
        window.showMyFollowing = function() { window.closeMobileSidebar(); if (allUsersData[myUsername]) { window.showUserList("Takip Edilenler", allUsersData[myUsername].following || []); } };
        window.showMyFollowers = function() { window.closeMobileSidebar(); if (allUsersData[myUsername]) { window.showUserList("Takipçiler", allUsersData[myUsername].followers || []); } };
        
        window.showUserList = function(title, userArray) {
            const titleEl = document.getElementById('users-list-title'); if(titleEl) titleEl.innerText = title;
            const container = document.getElementById('users-list-container'); if(!container) return;
            container.innerHTML = '';
            if(userArray.length === 0) { container.innerHTML = '<p style="text-align:center; color:#536471; padding:20px;">Henüz kimse yok.</p>'; } 
            else {
                userArray.forEach(uname => {
                    let uData = allUsersData[uname] || {}; let avatarHtml = uData.avatarUrl ? `<img src="${uData.avatarUrl}">` : `👤`; let vHtml = uData.isVerified ? '<span class="verified-badge" style="font-size:14px; margin-left:2px;">☑️</span>' : '';
                    container.innerHTML += `<div onclick="window.location.href='profile.html?user=${uname}'" class="user-row"><div class="row-avatar">${avatarHtml}</div><div><div style="font-weight:bold; color:#0f1419;">${uData.fullName || uname} ${vHtml}</div><div style="font-size:14px; color:#536471;">@${uname}</div></div></div>`;
                });
            }
            document.getElementById('users-list-modal').style.display = 'flex';
        };
        document.getElementById('close-list-btn')?.addEventListener('click', () => { document.getElementById('users-list-modal').style.display = 'none'; });

        function switchTab(tab) {
            currentTab = tab;
            if(tab === 'users') { tabUsers.classList.add('active'); tabTags.classList.remove('active'); searchInput.placeholder = "Kullanıcı adı yaz..."; } 
            else { tabTags.classList.add('active'); tabUsers.classList.remove('active'); searchInput.placeholder = "Etiket ara (örn: yazilim)..."; }
            const urlParams = new URLSearchParams(window.location.search); const tagParam = urlParams.get('tag');
            if(tab === 'tags' && tagParam) searchInput.value = tagParam; else searchInput.value = ''; performSearch(); 
        }

        tabUsers.addEventListener('click', () => switchTab('users')); tabTags.addEventListener('click', () => switchTab('tags'));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUsername = user.displayName || user.email.split('@')[0];
                fetchData();
            } else { window.location.href = "index.html"; }
        });

        function calculateTrendingTags() {
            const tagCounts = {};
            allPosts.forEach(post => {
                if (post.content) {
                    const matches = post.content.match(/#([a-zA-Z0-9ğüşıöçĞÜŞİÖÇ_]+)/g);
                    if (matches) { matches.forEach(tag => { const lowerTag = tag.toLowerCase(); tagCounts[lowerTag] = (tagCounts[lowerTag] || 0) + 1; }); }
                }
            });
            trendingTags = Object.keys(tagCounts).map(tag => { return { tag: tag, count: tagCounts[tag] }; }).sort((a, b) => b.count - a.count).slice(0, 15);
        }

        function fetchData() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                allUsers = []; allUsersData = {};
                snapshot.forEach(doc => { allUsersData[doc.id] = doc.data(); allUsers.push({ username: doc.id, avatarUrl: doc.data().avatarUrl || null, isVerified: doc.data().isVerified || false }); });
                
                if(allUsersData[myUsername]) {
                    const u = allUsersData[myUsername];
                    document.getElementById('sidebar-name-mobile').innerText = u.fullName || myUsername;
                    document.getElementById('sidebar-handle-mobile').innerText = '@' + myUsername;
                    document.getElementById('sidebar-following-count').innerText = (u.following || []).length;
                    document.getElementById('sidebar-followers-count').innerText = (u.followers || []).length;
                    if(u.avatarUrl) {
                        const imgTag = `<img src="${u.avatarUrl}" style="width:100%;height:100%;object-fit:cover;">`;
                        document.getElementById('mobile-avatar-header').innerHTML = imgTag;
                        document.getElementById('sidebar-avatar-mobile').innerHTML = imgTag;
                    }
                }
                performSearch(); 
            });
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
                allPosts = []; snapshot.forEach(doc => { allPosts.push(doc.data()); }); calculateTrendingTags(); 
                const urlParams = new URLSearchParams(window.location.search); if(urlParams.get('tag')) switchTab('tags'); else performSearch();
            });
        }

        function formatHashtags(text) { if (!text) return ""; let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); return safeText.replace(/#([a-zA-Z0-9ğüşıöçĞÜŞİÖÇ_]+)/g, `<a href="search.html?tag=$1" class="hashtag">#$1</a>`); }

        searchInput.addEventListener('input', performSearch);
        window.clickTrendingTag = function(tagWord) { searchInput.value = tagWord; performSearch(); };

        function performSearch() {
            const typedText = searchInput.value.toLowerCase().trim(); resultsContainer.innerHTML = ''; 

            if (typedText === '') {
                if (currentTab === 'users') {
                    resultsContainer.innerHTML = '<div style="color:#536471; padding:30px; text-align:center; font-size:15px;">Aramak için bir isim yazın... 🕵️‍♂️</div>';
                } else {
                    if (trendingTags.length === 0) { resultsContainer.innerHTML = '<div style="color:#536471; padding:30px; text-align:center;">Henüz hiç etiket kullanılmamış...</div>'; return; }
                    let html = ``;
                    trendingTags.forEach(item => { 
                        html += `<a class="trending-item" onclick="window.clickTrendingTag('${item.tag}')">
                                    <div class="trend-category">Gündemdekiler</div>
                                    <div class="trend-name">${item.tag}</div>
                                    <div class="trend-count">${item.count} Bip</div>
                                 </a>`; 
                    });
                    resultsContainer.innerHTML = html;
                }
                return;
            }

            if (currentTab === 'users') {
                const filteredUsers = allUsers.filter(user => user.username.toLowerCase().includes(typedText));
                if (filteredUsers.length === 0) { resultsContainer.innerHTML = '<div style="color:#536471; padding:30px; text-align:center;">Kişi bulunamadı...</div>'; return; }
                let html = '';
                filteredUsers.forEach(user => {
                    const avatarHtml = user.avatarUrl ? `<img src="${user.avatarUrl}" style="width:100%;height:100%;object-fit:cover;">` : '👤';
                    const fullName = allUsersData[user.username]?.fullName || user.username;
                    const vHtml = user.isVerified ? '<span style="color:#1da1f2; font-size:15px; margin-left:4px;">☑️</span>' : '';
                    html += `<a href="profile.html?user=${user.username}" class="search-user-item">
                                <div class="search-avatar">${avatarHtml}</div>
                                <div class="search-user-info">
                                    <div class="search-username">${fullName} ${vHtml}</div>
                                    <div class="search-handle">@${user.username}</div>
                                </div>
                             </a>`;
                });
                resultsContainer.innerHTML = html;
            } else {
                const searchTag = typedText.startsWith('#') ? typedText : `#${typedText}`;
                const filteredPosts = allPosts.filter(post => post.content && post.content.toLowerCase().includes(searchTag));
                if (filteredPosts.length === 0) { resultsContainer.innerHTML = '<div style="color:#536471; padding:30px; text-align:center;">Bu etikete sahip gönderi yok...</div>'; return; }
                let html = '';
                filteredPosts.forEach(post => {
                    const formattedContent = formatHashtags(post.content);
                    const authorData = allUsersData[post.author] || {};
                    const vHtml = authorData.isVerified ? '<span style="color:#1da1f2; font-size:14px; margin-left:4px;">☑️</span>' : '';
                    const fullName = authorData.fullName || post.author;
                    const avatarImg = authorData.avatarUrl ? `<img src="${authorData.avatarUrl}" style="width:100%;height:100%;object-fit:cover;">` : `👤`;
                    
                    html += `
                        <div class="post" onclick="window.location.href='profile.html?user=${post.author}'">
                            <div class="post-left"><div class="post-avatar-img">${avatarImg}</div></div>
                            <div class="post-right">
                                <div class="post-header-info">
                                    <div class="author-group"><span class="author-name">${fullName}</span>${vHtml} <span class="author-username">@${post.author}</span></div>
                                </div>
                                <div class="post-content">${formattedContent}</div>
                            </div>
                        </div>
                    `;
                });
                resultsContainer.innerHTML = html;
            }
        }
    </script>
</body>
</html>
