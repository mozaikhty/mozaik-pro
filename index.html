<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozaik - Giriş Yap</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .logo { font-size: 32px; font-weight: bold; color: #2980b9; margin-bottom: 10px; letter-spacing: 2px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        
        input, select { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; background: #f9f9f9; font-family: inherit; }
        input:focus, select:focus { border-color: #2980b9; background: white; }
        
        .input-group { text-align: left; margin-bottom: 5px; }
        .input-label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; display: block; margin-left: 5px; }

        button { width: 100%; padding: 12px; background: #000; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #333; }
        button:disabled { background: #888; cursor: not-allowed; }

        .toggle-link { margin-top: 20px; font-size: 13px; color: #666; padding-bottom: 20px; }
        .toggle-link a { color: #2980b9; text-decoration: none; font-weight: bold; cursor: pointer; }
        .toggle-link a:hover { text-decoration: underline; }

        .forgot-pass { margin-top: 15px; font-size: 12px; }
        .forgot-pass a { color: #e74c3c; text-decoration: none; font-weight: bold; cursor: pointer; }

        .error-msg { color: #e74c3c; font-size: 13px; margin-bottom: 15px; display: none; font-weight: bold; }
        .success-msg { color: #2ecc71; font-size: 13px; margin-bottom: 15px; display: none; font-weight: bold; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; width: auto; padding: 0; margin: 0; }
        .close-btn:hover { background: none; color: #000; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">MOZAİK</div>
        <div class="subtitle" id="form-subtitle">Dünyana bağlan.</div>

        <div id="error-message" class="error-msg"></div>
        <div id="success-message" class="success-msg"></div>

        <div id="login-section">
            <input type="text" id="login-email" placeholder="Kullanıcı Adı veya E-posta" required>
            <input type="password" id="login-pass" placeholder="Şifre" required>
            <button id="login-btn">Giriş Yap</button>
            <div class="forgot-pass">Şifreni mi unuttun? <a id="open-forgot-modal">Sıfırla</a></div>
            <div class="toggle-link">Hesabın yok mu? <a id="show-register">Kayıt Ol</a></div>
        </div>

        <div id="register-section" style="display: none;">
            
            <div class="input-group">
                <label class="input-label">Kullanıcı Adı (Benzersiz)</label>
                <input type="text" id="reg-username" placeholder="Örn: ahmet123 (Boşluksuz)" required>
            </div>
            
            <div class="input-group">
                <label class="input-label">Görünür İsim (Ad Soyad)</label>
                <input type="text" id="reg-fullname" placeholder="Örn: Ahmet Yılmaz" required>
            </div>

            <div class="input-group">
                <label class="input-label">E-posta Adresi</label>
                <input type="email" id="reg-email" placeholder="E-posta Adresi" required>
            </div>

            <div class="input-group">
                <label class="input-label">Doğum Tarihi</label>
                <input type="date" id="reg-birthdate" required>
            </div>

            <div class="input-group">
                <label class="input-label">Cinsiyet</label>
                <select id="reg-gender" required>
                    <option value="" disabled selected>Seçiniz...</option>
                    <option value="Kadın">Kadın</option>
                    <option value="Erkek">Erkek</option>
                    <option value="Belirtmek İstemiyorum">Belirtmek İstemiyorum</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">Yaşadığınız Şehir / Ülke</label>
                <input type="text" id="reg-location" placeholder="Örn: İstanbul, Türkiye" required>
            </div>

            <div class="input-group">
                <label class="input-label">Şifre (En az 6 hane, Harf ve Rakam)</label>
                <input type="password" id="reg-pass" placeholder="Şifre belirleyin" required>
            </div>

            <div class="input-group">
                <label class="input-label">Şifreyi Tekrar Girin</label>
                <input type="password" id="reg-pass-confirm" placeholder="Şifrenizi doğrulayın" required>
            </div>

            <button id="register-btn">Kayıt Ol ve Katıl</button>
            <div class="toggle-link">Zaten hesabın var mı? <a id="show-login">Giriş Yap</a></div>
        </div>
    </div>

    <div class="modal-overlay" id="forgot-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; font-size:18px;">Şifremi Unuttum</h3>
                <button class="close-btn" id="close-forgot-modal">&times;</button>
            </div>
            <p style="font-size:13px; color:#666; margin-bottom:15px;">Kayıtlı e-posta adresinizi girin. Size bir şifre sıfırlama bağlantısı göndereceğiz.</p>
            <input type="email" id="forgot-email" placeholder="E-posta Adresiniz">
            <button id="send-reset-btn" style="background:#2980b9;">Sıfırlama Linki Gönder</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC07_DzrwOlwWwopQZhUkHL1sj2zPDIT7k", authDomain: "mozaiksosyalmedya.firebaseapp.com", projectId: "mozaiksosyalmedya", storageBucket: "mozaiksosyalmedya.firebasestorage.app", messagingSenderId: "492534131254", appId: "1:492534131254:web:6644008a553294be05c697" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        // YENİ: Kayıt işlemi sürerken erken yönlendirmeyi engellemek için değişken
        let isRegistering = false; 

        onAuthStateChanged(auth, (user) => { 
            // Eğer bir kayıt işlemi devam etmiyorsa yönlendir
            if (user && !isRegistering) window.location.href = "feed.html"; 
        });

        const loginSection = document.getElementById('login-section');
        const registerSection = document.getElementById('register-section');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');
        const subtitle = document.getElementById('form-subtitle');

        function showError(msg) { errorMsg.innerText = msg; errorMsg.style.display = 'block'; successMsg.style.display = 'none'; }
        function showSuccess(msg) { successMsg.innerText = msg; successMsg.style.display = 'block'; errorMsg.style.display = 'none'; }

        document.getElementById('show-register').addEventListener('click', () => { loginSection.style.display = 'none'; registerSection.style.display = 'block'; errorMsg.style.display = 'none'; subtitle.innerText = "Aramıza katıl."; });
        document.getElementById('show-login').addEventListener('click', () => { registerSection.style.display = 'none'; loginSection.style.display = 'block'; errorMsg.style.display = 'none'; subtitle.innerText = "Dünyana bağlan."; });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const identifier = document.getElementById('login-email').value.trim(); 
            const pass = document.getElementById('login-pass').value;
            
            if(!identifier || !pass) return showError("Lütfen tüm alanları doldurun.");
            
            const btn = document.getElementById('login-btn'); 
            btn.disabled = true; btn.innerText = "Bekleyin...";
            
            try {
                let loginEmail = identifier;
                
                // Eğer girilen metinde "@" yoksa, bunun bir kullanıcı adı olduğunu anlıyoruz
                if (!identifier.includes('@')) {
                    const userDoc = await getDoc(doc(db, "users", identifier.toLowerCase()));
                    if (userDoc.exists() && userDoc.data().email) {
                        loginEmail = userDoc.data().email; // Gizlice E-postayı bulduk
                    } else {
                        throw new Error("user-not-found");
                    }
                }
                
                // Firebase'e bulduğumuz e-posta ile giriş yapıyoruz
                await signInWithEmailAndPassword(auth, loginEmail, pass);
                
            } catch (error) { 
                if (error.message === "user-not-found") showError("Bu kullanıcı adıyla kayıtlı bir hesap bulunamadı.");
                else showError("E-posta/Kullanıcı adı veya şifre hatalı."); 
                btn.disabled = false; btn.innerText = "Giriş Yap"; 
            }
        });

        document.getElementById('register-btn').addEventListener('click', async () => {
            let username = document.getElementById('reg-username').value.trim().toLowerCase();
            const fullName = document.getElementById('reg-fullname').value.trim();
            const email = document.getElementById('reg-email').value.trim(); 
            const birthDate = document.getElementById('reg-birthdate').value;
            const gender = document.getElementById('reg-gender').value;
            const location = document.getElementById('reg-location').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const passConfirm = document.getElementById('reg-pass-confirm').value;
            
            if(!username || !fullName || !email || !birthDate || !gender || !location || !pass || !passConfirm) return showError("Lütfen tüm bilgileri eksiksiz doldurun.");
            if(username.includes(' ')) return showError("Kullanıcı adında boşluk olamaz.");
            if(pass.length < 6) return showError("Şifre en az 6 karakter olmalıdır.");
            if(pass !== passConfirm) return showError("Şifreler birbiriyle eşleşmiyor!");
            if(!/\d/.test(pass) || !/[a-zA-Z]/.test(pass)) return showError("Şifreniz en az bir harf ve bir rakam içermelidir.");

            // YENİ: Kayıt işleminin başladığını sisteme bildir
            isRegistering = true; 
            const btn = document.getElementById('register-btn'); btn.disabled = true; btn.innerText = "Kaydediliyor...";
            
            try {
                const userRef = doc(db, "users", username); const docSnap = await getDoc(userRef);
                if (docSnap.exists()) { 
                    btn.disabled = false; btn.innerText = "Kayıt Ol ve Katıl"; 
                    isRegistering = false; // İşlem bittiği için sıfırla
                    return showError("Bu kullanıcı adı zaten alınmış!"); 
                }

                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                
                // Artık bu kodlar sayfa kapanmadan rahatça çalışabilir
                await updateProfile(user, { displayName: username });
                
                await setDoc(doc(db, "users", username), {
                    email: email, fullName: fullName, birthDate: birthDate, gender: gender, location: location,
                    followers: [], following: [], followRequests: [], bio: "Merhaba, ben Mozaik'te yeniyim!", 
                    isPrivate: false, isVerified: false, isBanned: false, createdAt: serverTimestamp()
                });
                
                // Tüm işlemler bittiğinde yönlendirmeyi BİZ kendimiz manuel yapıyoruz
                window.location.href = "feed.html"; 
                
            } catch (error) { 
                isRegistering = false; // Hata verirse yeniden denemek için sıfırla
                if(error.code === 'auth/email-already-in-use') showError("Bu e-posta adresi zaten kullanılıyor.");
                else showError("Kayıt sırasında bir hata oluştu.");
                btn.disabled = false; btn.innerText = "Kayıt Ol ve Katıl"; 
            }
        });

        const forgotModal = document.getElementById('forgot-modal');
        document.getElementById('open-forgot-modal').addEventListener('click', () => { forgotModal.style.display = 'flex'; });
        document.getElementById('close-forgot-modal').addEventListener('click', () => { forgotModal.style.display = 'none'; });
        
        document.getElementById('send-reset-btn').addEventListener('click', async () => {
            const email = document.getElementById('forgot-email').value.trim();
            if(!email) return alert("Lütfen e-posta adresinizi girin.");
            const btn = document.getElementById('send-reset-btn'); btn.disabled = true; btn.innerText = "Gönderiliyor...";
            try {
                await sendPasswordResetEmail(auth, email);
                forgotModal.style.display = 'none';
                showSuccess("Şifre sıfırlama linki e-postanıza gönderildi!");
            } catch(error) { alert("Hata: " + error.message); } 
            finally { btn.disabled = false; btn.innerText = "Sıfırlama Linki Gönder"; document.getElementById('forgot-email').value = ''; }
        });
    </script>
</body>
</html>
